<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Firmansyah Davin Falahtama - AI & Cloud Engineer Portfolio">
    <title>Davin Falahtama | AI & Cloud Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
    <div class="nav-overlay" id="navOverlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"></div>
        <ul class="nav-links" id="navLinks"></ul>
        <div class="sidebar-footer" id="socialLinks"></div>
    </nav>

    <main class="main-content" id="mainContent">
        <section id="hero" class="hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <p class="hero-greeting"></p>
                <h1 class="hero-title"></h1>
                <p class="hero-subtitle"><span class="typed-text"></span><span class="cursor">|</span></p>
                <div class="hero-actions">
                    <a href="#" class="btn btn-primary" data-target="projects">View My Work</a>
                    <a href="#" class="btn btn-outline" data-target="contact">Contact Me</a>
                </div>
                <div class="hero-scroll">
                    <span>Scroll Down</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </section>

        <div id="dynamic-sections"></div>

        <footer class="footer" id="footer">
            <p></p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
